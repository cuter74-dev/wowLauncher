openapi: 3.0.3
info:
  title: Remote Launcher — Desktop Agent API
  version: 0.1.0
  description: >
    HTTP API for a mobile app on the same LAN to connect to the Desktop Agent and launch
    **only pre-registered programs**. The mobile app requests a launch using only an `appId`;
    the executable path, arguments, and working directory are taken exclusively from the PC's
    settings. There is no endpoint for running arbitrary commands, shells, or scripts.


    Security: access tokens are stored on the PC as a SHA-256 hash only, and endpoints that
    require authentication expect `Authorization: Bearer <token>`. CORS is not used (this is not
    a browser API). Do not expose this on the public internet; use it only on a LAN/VPN (Tailscale).

servers:
  - url: http://{host}:{port}
    description: Desktop Agent on the LAN
    variables:
      host:
        default: 192.168.0.10
        description: The PC's LAN IPv4 address
      port:
        default: "8765"
        description: Agent server port

tags:
  - name: health
    description: Status check (no authentication required)
  - name: pairing
    description: Device pairing handshake (no authentication required)
  - name: apps
    description: App list/launch (Bearer authentication required)

paths:
  /api/health:
    get:
      tags: [health]
      summary: Get Agent status/metadata
      description: Used by the mobile app to check PC reachability and its name/platform. No authentication required.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                ok: true
                agentName: My-PC
                platform: windows
                version: 0.1.0

  /api/pair/request:
    post:
      tags: [pairing]
      summary: Create a pairing request
      description: >
        Starts pairing by presenting the single-use `pairingCode` from the QR. If the code is
        valid, a request in `pending` status is created and an approval banner is shown in the PC UI.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequest"
            example:
              pairingCode: AB12CD
              deviceName: cw iPhone
              deviceType: ios
      responses:
        "200":
          description: Request created (awaiting approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairRequestResponse"
              example:
                requestId: 7b1f3c2a-...
                status: pending
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid_body
        "403":
          description: Pairing code mismatch/expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid_pairing_code

  /api/pair/status/{requestId}:
    get:
      tags: [pairing]
      summary: Poll pairing approval status
      description: >
        The mobile app polls roughly every 1.5 seconds. On approval, an `accessToken` is included
        (this token is stored only on the mobile app; the PC keeps only its hash). An unknown
        requestId responds with `rejected`.
      security: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairStatusResponse"
              examples:
                pending:
                  value: { status: pending }
                approved:
                  value: { status: approved, accessToken: "eyJ...token" }
                rejected:
                  value: { status: rejected }

  /api/apps:
    get:
      tags: [apps]
      summary: List enabled apps
      description: >
        Returns only apps with `enabled = true`. For security, the executable path/arguments/working
        directory are not included; only `iconBase64` (if present) and display metadata are returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: App list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppListItem"
              example:
                - id: 6f0a...-app1
                  name: VSCode
                  iconBase64: iVBORw0KGgo...
                  enabled: true
                - id: 9c2b...-app2
                  name: Obsidian
                  iconBase64: null
                  enabled: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Blocked"

  /api/apps/{id}/launch:
    post:
      tags: [apps]
      summary: Launch a registered app
      description: >
        Launches using only the `id` (appId). Unregistered or disabled apps are rejected. The actual
        launch arguments come solely from values in the PC DB and cannot be supplied by the mobile app.
        Every attempt is recorded in an audit log on the PC.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: LaunchApp.id (UUID)
          schema:
            type: string
      responses:
        "200":
          description: Launch started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: true
                message: started
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Blocked device or disabled app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: false
                message: This app is disabled.
        "404":
          description: Unregistered app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: false
                message: This app is not registered.
        "500":
          description: Launch failed (missing path/error, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: false
                message: "Executable not found: C:\\\\nope.exe"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: The accessToken issued upon pairing approval. The PC retains only the SHA-256 hash of the token.

  responses:
    Unauthorized:
      description: Missing/invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: unauthorized
    Blocked:
      description: Blocked device
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: blocked

  schemas:
    HealthResponse:
      type: object
      required: [ok, agentName, platform, version]
      properties:
        ok:
          type: boolean
        agentName:
          type: string
        platform:
          type: string
          enum: [windows, macos, linux]
        version:
          type: string

    PairRequest:
      type: object
      required: [pairingCode, deviceName, deviceType]
      properties:
        pairingCode:
          type: string
          description: Single-use code contained in the QR
        deviceName:
          type: string
        deviceType:
          type: string
          enum: [ios, android]

    PairRequestResponse:
      type: object
      required: [requestId, status]
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [pending]

    PairStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
        accessToken:
          type: string
          nullable: true
          description: Included only when status is approved

    AppListItem:
      type: object
      description: Safe representation sent to the mobile app (excludes launch path/arguments)
      required: [id, name, enabled]
      properties:
        id:
          type: string
        name:
          type: string
        iconBase64:
          type: string
          nullable: true
          description: "base64 of a PNG/JPEG icon (no data: prefix)"
        enabled:
          type: boolean

    LaunchResponse:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
