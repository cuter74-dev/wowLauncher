openapi: 3.0.3
info:
  title: Remote Launcher — Desktop Agent API
  version: 0.1.0
  description: >
    같은 LAN에서 모바일 앱이 Desktop Agent에 접속해 **미리 등록된 프로그램만** 실행하기
    위한 HTTP API. 모바일은 `appId`로만 실행을 요청하며, 실행 파일 경로/인자/작업 폴더는
    전부 PC 쪽 설정값에서만 사용됩니다. 임의 명령/셸/스크립트 실행 엔드포인트는 존재하지
    않습니다.


    보안: 접근 토큰은 PC에 SHA-256 hash로만 저장되고, 인증이 필요한 엔드포인트는
    `Authorization: Bearer <token>` 를 요구합니다. CORS는 사용하지 않습니다(브라우저용 API 아님).
    공인 인터넷에 노출하지 말고 LAN/VPN(Tailscale)에서만 사용하세요.

servers:
  - url: http://{host}:{port}
    description: LAN 상의 Desktop Agent
    variables:
      host:
        default: 192.168.0.10
        description: PC의 LAN IPv4 주소
      port:
        default: "8765"
        description: Agent 서버 포트

tags:
  - name: health
    description: 상태 확인 (인증 불필요)
  - name: pairing
    description: 기기 페어링 핸드셰이크 (인증 불필요)
  - name: apps
    description: 앱 목록/실행 (Bearer 인증 필요)

paths:
  /api/health:
    get:
      tags: [health]
      summary: Agent 상태/메타 조회
      description: 모바일이 PC 도달 가능 여부 및 이름/플랫폼을 확인할 때 사용. 인증 불필요.
      security: []
      responses:
        "200":
          description: 정상
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                ok: true
                agentName: My-PC
                platform: windows
                version: 0.1.0

  /api/pair/request:
    post:
      tags: [pairing]
      summary: 페어링 요청 생성
      description: >
        QR에 들어 있던 일회용 `pairingCode`를 제시해 페어링을 시작합니다. 코드가 맞으면
        `pending` 상태의 요청이 생성되고, PC UI에 승인 배너가 표시됩니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequest"
            example:
              pairingCode: AB12CD
              deviceName: cw iPhone
              deviceType: ios
      responses:
        "200":
          description: 요청 생성됨 (승인 대기)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairRequestResponse"
              example:
                requestId: 7b1f3c2a-...
                status: pending
        "400":
          description: 잘못된 본문
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid_body
        "403":
          description: 페어링 코드 불일치/만료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid_pairing_code

  /api/pair/status/{requestId}:
    get:
      tags: [pairing]
      summary: 페어링 승인 상태 폴링
      description: >
        모바일이 약 1.5초 간격으로 폴링합니다. 승인 시 `accessToken`이 포함됩니다(이 토큰은
        모바일에만 저장되고 PC에는 hash만 남습니다). 알 수 없는 requestId는 `rejected`로 응답합니다.
      security: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 현재 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairStatusResponse"
              examples:
                pending:
                  value: { status: pending }
                approved:
                  value: { status: approved, accessToken: "eyJ...token" }
                rejected:
                  value: { status: rejected }

  /api/apps:
    get:
      tags: [apps]
      summary: 활성화된 앱 목록 조회
      description: >
        `enabled = true` 인 앱만 반환합니다. 보안상 실행 파일 경로/인자/작업 폴더는 포함되지
        않으며, `iconBase64`(있을 경우)와 표시용 메타만 내려갑니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 앱 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppListItem"
              example:
                - id: 6f0a...-app1
                  name: VSCode
                  iconBase64: iVBORw0KGgo...
                  enabled: true
                - id: 9c2b...-app2
                  name: Obsidian
                  iconBase64: null
                  enabled: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Blocked"

  /api/apps/{id}/launch:
    post:
      tags: [apps]
      summary: 등록된 앱 실행
      description: >
        `id`(appId)로만 실행합니다. 등록되지 않았거나 비활성 앱은 거부됩니다. 실제 실행 인자는
        PC DB의 값만 사용되며 모바일이 전달할 수 없습니다. 모든 시도는 PC에 감사 로그로 기록됩니다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: LaunchApp.id (UUID)
          schema:
            type: string
      responses:
        "200":
          description: 실행 시작됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: true
                message: started
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 차단된 기기이거나 비활성 앱
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: false
                message: 비활성화된 앱입니다.
        "404":
          description: 등록되지 않은 앱
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: false
                message: 등록되지 않은 앱입니다.
        "500":
          description: 실행 실패(경로 부재/오류 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"
              example:
                ok: false
                message: "실행 파일을 찾을 수 없습니다: C:\\\\nope.exe"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 페어링 승인 시 발급된 accessToken. PC는 토큰의 SHA-256 hash만 보관합니다.

  responses:
    Unauthorized:
      description: 토큰 누락/무효
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: unauthorized
    Blocked:
      description: 차단된 기기
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: blocked

  schemas:
    HealthResponse:
      type: object
      required: [ok, agentName, platform, version]
      properties:
        ok:
          type: boolean
        agentName:
          type: string
        platform:
          type: string
          enum: [windows, macos, linux]
        version:
          type: string

    PairRequest:
      type: object
      required: [pairingCode, deviceName, deviceType]
      properties:
        pairingCode:
          type: string
          description: QR에 담긴 일회용 코드
        deviceName:
          type: string
        deviceType:
          type: string
          enum: [ios, android]

    PairRequestResponse:
      type: object
      required: [requestId, status]
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [pending]

    PairStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
        accessToken:
          type: string
          nullable: true
          description: status가 approved일 때만 포함

    AppListItem:
      type: object
      description: 모바일로 전송되는 안전한 표현 (실행 경로/인자 미포함)
      required: [id, name, enabled]
      properties:
        id:
          type: string
        name:
          type: string
        iconBase64:
          type: string
          nullable: true
          description: "PNG/JPEG 아이콘의 base64 (data: 접두사 없음)"
        enabled:
          type: boolean

    LaunchResponse:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
