name: mobile_app
description: Remote Launcher mobile client (Android/iOS).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  shared:
    path: ../../packages/shared

  flutter_riverpod: ^2.5.1

  # HTTP client for the agent API.
  http: ^1.2.1

  # QR scanning for pairing.
  mobile_scanner: ^5.2.3

  # Local storage for paired PCs + tokens.
  sqflite: ^2.3.3
  path: ^1.9.0

  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
