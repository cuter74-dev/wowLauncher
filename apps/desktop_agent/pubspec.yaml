name: desktop_agent
description: Remote Launcher desktop agent (Windows/macOS/Linux).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared models / DTOs.
  shared:
    path: ../../packages/shared

  # State management.
  flutter_riverpod: ^2.5.1

  # Embedded HTTP server.
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # Local storage (SQLite via FFI for desktop platforms).
  sqflite_common_ffi: ^2.3.3

  # QR code generation for pairing.
  qr_flutter: ^4.1.0

  # Security / ids.
  crypto: ^3.0.3
  uuid: ^4.4.0

  # File pickers (executable + icon) and paths.
  file_picker: ^8.0.3
  path: ^1.9.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
