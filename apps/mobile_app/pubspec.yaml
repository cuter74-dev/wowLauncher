name: mobile_app
description: Remote Launcher mobile client (Android/iOS).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  shared:
    path: ../../packages/shared

  flutter_riverpod: ^2.5.1

  # HTTP client for the agent API.
  http: ^1.2.1

  # QR scanning for pairing.
  mobile_scanner: ^5.2.3

  # Local storage for paired PCs + tokens.
  sqflite: ^2.3.3
  path: ^1.9.0

  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# Splash screen generation (run: dart run flutter_native_splash:create).
flutter_native_splash:
  color: "#0B1220"
  image: assets/wow_launcher_logo.png
  android_12:
    color: "#0B1220"
    image: assets/wow_launcher_logo.png

# App launcher icon generation (run: dart run flutter_launcher_icons).
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#0B1220"
  image_path: "assets/wow_launcher_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/wow_launcher_logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/wow_launcher_logo.png
