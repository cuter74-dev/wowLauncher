name: Release Desktop

# Build the desktop agent for macOS / Windows / Linux and attach the
# installers to a GitHub Release. Trigger by pushing a tag like `v1.0.0`,
# or run manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.2'
  # Optional: set a repo secret GLITCHTIP_DSN to enable error tracking.
  GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Generate runner + build
        working-directory: apps/desktop_agent
        run: |
          flutter create . --platforms=macos
          # App name
          sed -i '' 's/PRODUCT_NAME = desktop_agent/PRODUCT_NAME = wowLauncher/' macos/Runner/Configs/AppInfo.xcconfig
          # Entitlements: LAN server/client + disable sandbox (launches external apps)
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.files.user-selected.read-only bool true" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" "$f" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f" 2>/dev/null || true
          done
          flutter pub get
          dart run flutter_launcher_icons || true
          flutter build macos --release ${GLITCHTIP_DSN:+--dart-define=GLITCHTIP_DSN=$GLITCHTIP_DSN}
      - name: Package DMG
        working-directory: apps/desktop_agent
        run: |
          APP="build/macos/Build/Products/Release/wowLauncher.app"
          mkdir -p dist
          hdiutil create -volname "wowLauncher" -srcfolder "$APP" -ov -format UDZO "dist/wowLauncher-macos.dmg"
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop_agent/dist/wowLauncher-macos.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Generate runner + build
        working-directory: apps/desktop_agent
        shell: bash
        run: |
          flutter create . --platforms=windows
          flutter pub get
          flutter build windows --release ${GLITCHTIP_DSN:+--dart-define=GLITCHTIP_DSN=$GLITCHTIP_DSN}
      - name: Zip
        working-directory: apps/desktop_agent
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath wowLauncher-windows-x64.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop_agent/wowLauncher-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang pkg-config libgtk-3-dev liblzma-dev libsqlite3-dev libcurl4-openssl-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Generate runner + build
        working-directory: apps/desktop_agent
        run: |
          flutter create . --platforms=linux
          flutter pub get
          flutter build linux --release ${GLITCHTIP_DSN:+--dart-define=GLITCHTIP_DSN=$GLITCHTIP_DSN}
      - name: Tar
        working-directory: apps/desktop_agent
        run: tar -C build/linux/x64/release/bundle -czf wowLauncher-linux-x64.tar.gz .
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop_agent/wowLauncher-linux-x64.tar.gz
